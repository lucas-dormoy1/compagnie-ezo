<nav class="menu-panel" aria-label="Menu principal" i18n-aria-label>
  <button class="menu-trigger" (click)="isOpen = !isOpen" aria-label="Ouvrir le menu" i18n-aria-label>
    <img src="assets/menu.svg" class="menu-icon" alt="menu" />
  </button>
  <div class="menu" *ngIf="isOpen" [@dropDownMenu] role="navigation">
    <div class="menu-item bottom-border languages">
      <button class="language-button" (click)="switchLanguageFR()" aria-label="Passer en français" i18n-aria-label>FR</button
      ><span>|</span
      ><button class="language-button" (click)="switchLanguageEN()" aria-label="Switch to English" i18n-aria-label>EN</button>
    </div>
    <div class="menu-item bottom-border">
      <a routerLink="/home" class="menu-link" (click)="closeMenu()" i18n
        >Accueil</a
      >
    </div>
    <div class="menu-item bottom-border">
      <a routerLink="/about" class="menu-link" (click)="closeMenu()" i18n
        >Présentation</a
      >
    </div>
    <div class="bottom-border">
      <app-creations-menu (menuClosed)="closeMenu()"></app-creations-menu>
    </div>
    <div class="bottom-border">
      <app-projects-menu (menuClosed)="closeMenu()"></app-projects-menu>
    </div>
    <div class="menu-item bottom-border">
      <a routerLink="/workshops" class="menu-link" (click)="closeMenu()" i18n
        >Ateliers</a
      >
    </div>
    <div class="menu-item bottom-border">
      <a routerLink="/contact" class="menu-link" (click)="closeMenu()" i18n
        >Contact</a
      >
    </div>
  </div>
</nav>
